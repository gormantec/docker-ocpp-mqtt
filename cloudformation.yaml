AWSTemplateFormatVersion: "2010-09-09"
Description: OCPP-to-MQTT Bridge — Infrastructure (Networking)
Metadata: {}
Parameters:
  MQTT_CA_CERT_B64:
    Type: String
    Default: '{{resolve:secretsmanager:gormantec.com/MQTT_CA_CERT_B64:SecretString}}'
    NoEcho: true
  MQTT_CLIENT_CERT_B64:
    Type: String
    Default: '{{resolve:secretsmanager:gormantec.com/MQTT_CLIENT_CERT_B64:SecretString}}'
    NoEcho: true
  MQTT_CLIENT_KEY_B64:
    Type: String
    Default: '{{resolve:secretsmanager:gormantec.com/MQTT_CLIENT_KEY_B64:SecretString}}'
    NoEcho: true
  MQTT_BROKER:
    Type: String
    Default: docker-iot_server
  MQTT_PORT:
    Type: String
    Default: '8883'
  MQTT_TRANSPORT:
    Type: String
    Default: tcp
  MQTT_THING_NAME:
    Type: String
    Default: gormantec-ocpp-bridge
  OCPP_HOST:
    Type: String
    Default: 0.0.0.0
  OCPP_PORT:
    Type: String
    Default: '9000'
  OCPP_WS_PATH:
    Type: String
    Default: '/{charge_point_id}'
  UI_PORT:
    Type: String
    Default: '9094'
  DOCDB_URL:
    Type: String
    Default: http://docker-iot_docdb:5984
    Description: CouchDB endpoint for schedule persistence
  DOCDB_USER:
    Type: String
    Default: admin
  DOCDB_PASSWORD:
    Type: String
    Default: '{{resolve:secretsmanager:gormantec.com/DOCDB_PASSWORD:SecretString}}'
    NoEcho: true
Resources:
  DocDBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: DOCDB_PASSWORD
      Description: DocumentDB master password (from SECRET_DOCDB_PASSWORD)
  OcppMqttLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/ocpp-mqtt
      RetentionInDays: 30
  OcppMqttTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Metadata:
      IoTCoreLite:
        _injectFromCompose: true
    Properties:
      Family: ocpp-mqtt
      Cpu: "256"
      Memory: "512"
      NetworkMode: bridge
      ContainerDefinitions:
        - Name: ocpp-mqtt
          Image: PLACEHOLDER
          PortMappings:
            - ContainerPort: "9000"
            - ContainerPort: "9094"
          Environment:
            - Name: MQTT_BROKER
              Value:
                Ref: MQTT_BROKER
            - Name: MQTT_PORT
              Value:
                Ref: MQTT_PORT
            - Name: MQTT_TRANSPORT
              Value:
                Ref: MQTT_TRANSPORT
            - Name: MQTT_THING_NAME
              Value:
                Ref: MQTT_THING_NAME
            - Name: MQTT_CA_CERT_B64
              Value:
                Ref: MQTT_CA_CERT_B64
            - Name: MQTT_CLIENT_CERT_B64
              Value:
                Ref: MQTT_CLIENT_CERT_B64
            - Name: MQTT_CLIENT_KEY_B64
              Value:
                Ref: MQTT_CLIENT_KEY_B64
            - Name: OCPP_HOST
              Value:
                Ref: OCPP_HOST
            - Name: OCPP_PORT
              Value:
                Ref: OCPP_PORT
            - Name: OCPP_WS_PATH
              Value:
                Ref: OCPP_WS_PATH
            - Name: UI_PORT
              Value:
                Ref: UI_PORT
            - Name: DOCDB_URL
              Value:
                Ref: DOCDB_URL
            - Name: DOCDB_USER
              Value:
                Ref: DOCDB_USER
            - Name: DOCDB_PASSWORD
              Value:
                Ref: DOCDB_PASSWORD
      _restartPolicy: unless-stopped
  OcppMqttService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: docker-ocpp-mqtt
      TaskDefinition: !Ref OcppMqttTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      PlacementConstraints:
        - Expression: "node.role == manager"
      NetworkAlias: ecs-docker-ocpp-mqtt
  OcppMqttWebapp:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: webapp
      PathPattern: /webapp/ocpp-mqtt/*
      Priority: 10
      Actions:
        - Type: forward
          TargetService: ecs-docker-ocpp-mqtt
          TargetPort: 9000
Outputs:
  LogGroup:
    Description: CloudWatch Log Group for container logs
    Value: /ecs/ocpp-mqtt
